<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#000000"/>
  
  <text x="400" y="80" text-anchor="middle"
    font-family="Arial Narrow, Arial" font-size="13"
    fill="white" letter-spacing="4" opacity="0">
    RITAM ROA
    <animate attributeName="opacity" from="0" to="1"
      begin="0.5s" dur="2s" fill="freeze"/>
  </text>

  <text x="400" y="125" text-anchor="middle"
    font-family="Arial Narrow, Arial" font-size="28"
    font-weight="bold" fill="white" letter-spacing="3" opacity="0">
    CODING THROUGH WEIRD PROJECTS
    <animate attributeName="opacity" from="0" to="1"
      begin="1.5s" dur="2.5s" fill="freeze"/>
  </text>

  <text x="400" y="165" text-anchor="middle"
    font-family="Arial Narrow, Arial" font-size="11"
    fill="#888888" letter-spacing="5" opacity="0">
    AND HE WAS NEVER HEARD FROM AGAIN
    <animate attributeName="opacity" from="0" to="1"
      begin="3s" dur="2s" fill="freeze"/>
  </text>
</svg>

    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="34" cy="18" r="4" fill="#550011"/>
  <circle cx="48" cy="18" r="4" fill="#2a0008"/>

  <!-- topbar title -->

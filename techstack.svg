<svg width="860" height="520" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="sepgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0a0000"/>
      <stop offset="30%" stop-color="#ff003c22"/>
      <stop offset="70%" stop-color="#ff003c11"/>
      <stop offset="100%" stop-color="#0a0000"/>
    </linearGradient>
    <linearGradient id="catline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff003c33"/>
      <stop offset="100%" stop-color="#0a0000"/>
    </linearGradient>
    <linearGradient id="glowgrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff003c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#0a0000" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="titleglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- scanline pattern -->
    <pattern id="scan" x="0" y="0" width="860" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="860" height="1" fill="#ff003c" opacity="0.018"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="860" height="520" fill="#060001" rx="10"/>
  <!-- glow at top -->
  <rect width="860" height="200" fill="url(#glowgrad)" rx="10"/>
  <!-- scanlines -->
  <rect width="860" height="520" fill="url(#scan)" rx="10"/>
  <!-- outer border -->
  <rect width="860" height="520" fill="none" stroke="#ff003c" stroke-width="1" stroke-opacity="0.3" rx="10"/>

  <!-- topbar bg -->
  <rect width="860" height="36" fill="#0e0002" rx="10"/>
  <rect y="10" width="860" height="26" fill="#0e0002"/>
  <line x1="0" y1="36" x2="860" y2="36" stroke="#ff003c" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- topbar dots -->
